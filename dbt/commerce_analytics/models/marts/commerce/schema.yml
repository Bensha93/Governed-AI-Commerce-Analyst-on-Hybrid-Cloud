version: 2

models:
  - name: fact_orders
    description: Order-level fact table with item, freight, payment, and delivery measures.
    columns:
      - name: order_id
        tests:
          - unique
          - not_null
      - name: order_status
        tests:
          - not_null
          - accepted_values:
              values: ['delivered', 'shipped', 'canceled', 'unavailable', 'invoiced', 'processing', 'created', 'approved']

  - name: mart_order_reconciliation
    description: Reconciles order item value, freight value, and payment value.
    columns:
      - name: order_id
        tests:
          - unique
          - not_null
      - name: reconciliation_status
        tests:
          - not_null
          - accepted_values:
              values: ['matched', 'overpaid', 'underpaid', 'missing_payment', 'payment_without_items', 'excluded_cancelled_order', 'unknown']

  - name: mart_revenue_performance
    description: Monthly revenue and mismatch summary for AI analyst reporting.
